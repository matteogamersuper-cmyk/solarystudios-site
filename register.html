<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registrazione - SolaryStudios</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="images/immagine-del-sito.jpg" type="image/png">
    <link rel="stylesheet" href="./widget-solarystudios/widget.css">
    <script src="./widget-solarystudios/widget.js" defer></script>
    <link rel="stylesheet" href="link-warning/style.css">
    <script src="link-warning/script.js" defer></script>
</head>
<body>
    <header>
        <div class="container">
            <nav>
                <div class="logo">
                    <span class="logo-icon">☀️</span>
                    <span>SolaryStudios</span>
                </div>
                <ul>
                    <li><a href="index.html">🏠 Home</a></li>
                    <li><a href="login.html">Login</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <section class="register-section">
        <div class="container">
            <div class="form-container">
                <h2>Crea il tuo Account</h2>
                <form id="registerForm">
                    <div class="form-group">
                        <label for="regUsername">Username:</label>
                        <input type="text" id="regUsername" name="username" required>
                    </div>
                    <div class="form-group">
                        <label for="regEmail">Email:</label>
                        <input type="email" id="regEmail" name="email" required>
                    </div>
                    <div class="form-group">
                        <label for="regPassword">Password:</label>
                        <input type="password" id="regPassword" name="password" required>
                    </div>
                    <div class="form-group">
                        <label for="confirmPassword">Conferma Password:</label>
                        <input type="password" id="confirmPassword" name="confirmPassword" required>
                    </div>
                    <button type="submit" class="btn">Registrati</button>
                </form>
                <p>Hai già un account? <a href="login.html">Accedi qui</a></p>
            </div>
        </div>
    </section>

    <footer>
    </footer>

    <script src="script.js"></script>
</body>
</html>
