<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - SolaryStudios</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="images/immagine-del-sito.jpg" type="image/png">
    <link rel="stylesheet" href="./widget-solarystudios/widget.css">
    <script src="./widget-solarystudios/widget.js" defer></script>
    <link rel="stylesheet" href="link-warning/style.css">
    <script src="link-warning/script.js" defer></script>
</head>
<body>
    <header>
        <div class="container">
            <nav>
                <div class="logo">
                    <span class="logo-icon">☀️</span>
                    <span>SolaryStudios</span>
                </div>
                <ul>
                    <li><a href="index.html">🏠 Home</a></li>
                    <li><a href="register.html">Registrati</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <section class="login-section">
        <div class="container">
            <div class="form-container">
                <h2>Accedi al tuo Account</h2>
                <form id="loginForm">
                    <div class="form-group">
                        <label for="username">Username o Email:</label>
                        <input type="text" id="username" name="username" required>
                    </div>
                    <div class="form-group">
                        <label for="password">Password:</label>
                        <input type="password" id="password" name="password" required>
                    </div>
                    <button type="submit" class="btn">Accedi</button>
                </form>
                <p>Non hai un account? <a href="register.html">Registrati qui</a></p>
            </div>
        </div>
    </section>

    <footer>
    </footer>

    <script src="script.js"></script>
</body>
</html>
